# Easiest persistent run:  docker compose -f deploy/docker-compose.yml up -d
# Auto-restarts on crash/reboot. Reads credentials from .env.secrets at repo root.
services:
  trader-loop:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env.secrets
    environment:
      INTERVAL: "900"
      DAILY_CAP: "5"
      MODE: "--execute"   # set to "" for dry-run
    restart: unless-stopped
    volumes:
      - ../trader/state:/app/trader/state
